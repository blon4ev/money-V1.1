<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Budget App v1.1 with Tamagotchi</title>
  <style>
    /* =========================================
       v1.0 Base & Reset Styles
       ========================================= */
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
    body { background-color: #121212; color: #ffffff; padding-bottom: 80px; }
    
    .screen-main { padding: 20px; max-width: 480px; margin: 0 auto; position: relative; }
    .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; font-size: 20px; font-weight: bold; }
    
    /* v1.0 UI Elements */
    .compact-summary { background: #1e1e1e; padding: 16px; border-radius: 16px; margin-bottom: 20px; }
    .ledger-list { display: flex; flex-direction: column; gap: 10px; }
    .ledger-item { background: #2a2a2a; padding: 12px 16px; border-radius: 12px; display: flex; justify-content: space-between; }
    
    .fab { position: fixed; bottom: 30px; right: 30px; width: 56px; height: 56px; background: #007aff; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 24px; box-shadow: 0 4px 12px rgba(0,122,255,0.4); z-index: 100; cursor: pointer; color: white; border: none; }
    
    /* =========================================
       v1.1 Tamagotchi Zone Styles (Glassmorphism)
       ========================================= */
    .tama-zone {
      position: relative;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 20px;
      padding: 20px;
      margin-bottom: 20px;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      display: flex;
      flex-direction: column;
      align-items: center;
      z-index: 10;
      overflow: hidden;
    }

    .tama-header {
      width: 100%;
      display: flex;
      justify-content: space-between;
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 10px;
      z-index: 12;
    }

    .tama-character {
      font-size: 72px;
      margin: 10px 0;
      z-index: 12;
      transition: transform 0.2s ease;
    }

    .tama-hunger-bar {
      width: 100%;
      height: 8px;
      background: rgba(255, 255, 255, 0.2);
      border-radius: 4px;
      overflow: hidden;
      margin-top: 10px;
      z-index: 12;
    }
    
    .tama-hunger-fill {
      height: 100%;
      width: 100%;
      background: #34c759;
      transition: width 0.5s ease, background-color 0.5s ease;
    }

    .tama-receipts {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      pointer-events: none;
      z-index: 11;
    }
    .receipt-icon {
      position: absolute;
      font-size: 20px;
      opacity: 0.7;
    }

    .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 200; align-items: center; justify-content: center; }
    .modal-content { background: #1e1e1e; padding: 24px; border-radius: 16px; width: 90%; max-width: 400px; }
    .modal input { width: 100%; padding: 12px; margin: 8px 0 16px; border-radius: 8px; border: none; background: #2a2a2a; color: white; }
    .modal button { width: 100%; padding: 14px; background: #007aff; border: none; border-radius: 8px; color: white; font-weight: bold; font-size: 16px; }
  </style>
</head>
<body>

  <div class="screen-main">
    <div class="header">
      <span>< 2026년 3월 ></span>
    </div>

    <div class="tama-zone" id="tamaZone">
      <div class="tama-receipts" id="tamaReceipts"></div>
      <div class="tama-header">
        <span id="tamaInfo">Lv.1 (0 XP)</span>
        <span id="tamaStreak">🔥 0일째!</span>
      </div>
      <div class="tama-character" id="tamaChar">🥚</div>
      <div class="tama-hunger-bar">
        <div class="tama-hunger-fill" id="tamaHungerFill"></div>
      </div>
    </div>

    <div class="compact-summary">
      <p>이번 달 지출 요약: <strong id="totalSpent">0</strong>원</p>
    </div>

    <div class="ledger-list" id="ledgerList"></div>
  </div>

  <button class="fab" onclick="openModal()">+</button>

  <div class="modal" id="inputModal">
    <div class="modal-content">
      <h3>내역 추가</h3>
      <input type="date" id="recordDate" required>
      <input type="number" id="recordAmount" placeholder="금액 (0원 초과)" required>
      <input type="text" id="recordNote" placeholder="내용">
      <button onclick="saveRecord()">저장 (Save)</button>
      <button onclick="closeModal()" style="background: transparent; color: #ff453a; margin-top: 8px;">취소</button>
    </div>
  </div>

  <script>
    const LEDGER_KEY = 'ledger_v1.0';
    const TAMA_KEY = 'tama_status_v1_1';

    let ledger = JSON.parse(localStorage.getItem(LEDGER_KEY)) || [];
    
    // [Fix 적용됨] lastHungerUpdateTime이 포함된 상태 객체
    let tamaState = JSON.parse(localStorage.getItem(TAMA_KEY)) || {
      hunger: 100,
      xp: 0,
      level: 1,
      isDead: false,
      missedDaysFilled: 0,
      lastRecordTime: Date.now(),
      lastHungerUpdateTime: Date.now(),
      lastRecordDate: getTodayDateStr(),
      streak: 0
    };

    function getTodayDateStr() {
      const d = new Date();
      return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    }

    function saveState() {
